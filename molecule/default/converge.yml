---
- name: Converge
  hosts: all
  # Containers are entered as root; sudo-based become is unreliable in the
  # geerlingguy images on hosted runners, so run directly as root.
  become: false

  pre_tasks:
    - name: Update apt cache.
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 600
      when: ansible_facts.os_family == 'Debian'

  roles:
    - role: geerlingguy.packer
