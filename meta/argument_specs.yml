---
argument_specs:
  main:
    short_description: Install HashiCorp Packer on Linux.
    description:
      - Downloads, checksum-verifies, and installs a specific version of
        HashiCorp Packer into a directory on the system PATH.
    author:
      - geerlingguy
    options:
      packer_version:
        type: str
        required: false
        description: The version of Packer to install.
      packer_arch:
        type: str
        required: false
        description: >-
          Target CPU architecture (e.g. amd64, arm64, arm, 386). Auto-detected
          from the host architecture by default.
      packer_arch_map:
        type: dict
        required: false
        description: >-
          Mapping of host architecture (ansible_architecture) to the Packer
          release architecture string used when building the download URL.
      packer_bin_path:
        type: str
        required: false
        description: Directory the packer binary is installed into.
      packer_verify_checksum:
        type: bool
        required: false
        description: >-
          Whether to verify the downloaded archive against HashiCorp's published
          SHA256SUMS file.
      packer_download_url:
        type: str
        required: false
        description: Full URL of the Packer release archive to download.
      packer_checksum_url:
        type: str
        required: false
        description: URL of the SHA256SUMS file used for checksum verification.
      packer_download_dest:
        type: str
        required: false
        description: Local path the Packer archive is downloaded to.
